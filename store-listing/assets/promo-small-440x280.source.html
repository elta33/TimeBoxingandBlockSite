*{margin:0;padding:0;box-sizing:border-box}
html,body{width:440px;height:280px;overflow:hidden}
.tile{width:440px;height:280px;position:relative;
  background:radial-gradient(120% 140% at 78% 18%, #26384d 0%, #1a2634 42%, #0f151d 100%);

.ring{position:absolute;border-radius:50%;border:solid;opacity:.10}

.r2{width:230px;height:230px;right:-40px;top:-30px;border-width:22px;border-color:#ffffff;opacity:.05}

.brandrow{display:flex;align-items:center;gap:16px}
.icon{width:66px;height:66px;border-radius:16px;box-shadow:0 6px 18px rgba(0,0,0,.45)}
.name{font-size:34px;font-weight:800;letter-spacing:-.5px}
.name .dot{color:#ff6347}
.tag{margin-top:20px;font-size:23px;font-weight:700;line-height:1.25;letter-spacing:-.2px}
.tag b{color:#ff8563}
.sub{margin-top:12px;font-size:14px;font-weight:500;color:#b9c4d1;letter-spacing:.1px}
.chips{margin-top:18px;display:flex;gap:8px}
.chip{font-size:11px;font-weight:600;color:#dfe7ef;background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.10);padding:5px 11px;border-radius:20px}
</style></head><body>
