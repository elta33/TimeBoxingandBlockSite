<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>접속 차단됨</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      background-color: #1a1a1a;
      overflow: hidden;
      position: relative;
    }

    /* 배경 이미지 레이어 */
    #bg-layer {
      position: fixed;
      inset: 0;
      z-index: -2;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    #bg-layer.loaded { opacity: 1; }

    /* 가독성을 위한 어두운 오버레이 */
    #bg-overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: rgba(0, 0, 0, 0.55);
    }

    .block-content {
      text-align: center;
      padding: 0 24px;
      max-width: 760px;
    }

    h1 {
      font-size: 2rem;
      margin: 0 0 28px;
      color: #ff5555;
      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    }

    #quote {
      font-size: 1.7rem;
      font-weight: 600;
      line-height: 1.6;
      text-shadow: 0 2px 16px rgba(0,0,0,0.85);
      animation: fadeUp 0.7s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .subtitle {
      margin-top: 22px;
      font-size: 0.95rem;
      opacity: 0.75;
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>
  <div id="bg-layer"></div>
  <div id="bg-overlay"></div>

  <div class="block-content">
    <h1>🚫 타임박스 차단 발동!</h1>
    <div id="quote"></div>
    <p class="subtitle" id="subtitle">현재 스케쥴에 의해 접속이 제한되었습니다.</p>
  </div>

  <script src="block.js"></script>
</body>
</html>
