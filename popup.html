<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Focus Timeboxer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 17px;
      color: #111;
      background: #fff;
      margin: 0;
    }

    /* ── 헤더 ── */
    .p-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
    }
    .p-header-left { display: flex; align-items: center; gap: 7px; }
    .p-title { font-size: 17px; font-weight: 600; }
    .p-settings-btn {
      background: none; border: none; cursor: pointer;
      color: #aaa; padding: 3px; border-radius: 4px;
      display: flex; align-items: center;
      transition: color 0.12s;
      font-family: inherit;
    }
    .p-settings-btn:hover { color: #333; }

    /* ── 섹션 ── */
    .p-section { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; }
    .p-section-label { font-size: 14px; color: #999; margin-bottom: 6px; }

    /* ── 현재 페이지 ── */
    .p-page-row {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .p-domain {
      font-size: 17px; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
    }
    .p-add-btns { display: flex; gap: 5px; flex-shrink: 0; }
    .p-add-btn {
      font-size: 14px; padding: 3px 8px;
      background: #fff; border: 1px solid #ddd; border-radius: 5px;
      cursor: pointer; color: #555; white-space: nowrap;
      transition: background 0.12s; font-family: inherit;
    }
    .p-add-btn:hover { background: #f5f5f5; }
    .p-domain-badge {
      font-size: 14px; padding: 3px 8px; border-radius: 5px;
      font-weight: 500; flex-shrink: 0; white-space: nowrap;
    }
    .p-badge-permanent { background: #fff1ee; border: 1px solid #ffd6c9; color: #b23a1e; }
    .p-badge-general   { background: #fffbe6; border: 1px solid #ffe58f; color: #875500; }

    /* ── 하루 스케줄 토글 ── */
    .p-toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .p-switch-wrap { display: flex; align-items: center; gap: 7px; }
    .p-switch-track {
      width: 32px; height: 18px; border-radius: 9px;
      background: #ddd; position: relative; cursor: pointer;
      transition: background 0.2s; flex-shrink: 0; outline: none;
    }
    .p-switch-track:focus-visible { box-shadow: 0 0 0 2px #bbb; }
    .p-switch-track.on { background: #ff6347; }
    .p-switch-thumb {
      position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.25);
      transition: left 0.2s;
    }
    .p-switch-track.on .p-switch-thumb { left: 16px; }
    .p-toggle-lbl { font-size: 14px; color: #bbb; transition: color 0.2s; }
    .p-toggle-lbl.active { color: #ff6347; font-weight: 500; }

    /* ── 스케줄 섹션 ── */
    #scheduleSection { border-bottom: none; transition: opacity 0.2s; }
    #scheduleSection.disabled { opacity: 0.35; pointer-events: none; }

    /* ── 현재 박스 카드 ── */
    .p-box-card {
      background: #f8f8f8; border: 1px solid #ebebeb; border-radius: 7px; padding: 8px 10px;
    }
    .p-box-card.active { background: #fff1ee; border-color: #ffd6c9; }
    .p-box-card-top { display: flex; align-items: center; gap: 6px; }
    .p-box-dot { width: 7px; height: 7px; border-radius: 50%; background: #ff6347; flex-shrink: 0; }
    .p-box-dot.dim { background: #ffab91; }
    .p-box-name {
      font-size: 17px; font-weight: 500; color: #b23a1e;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0;
    }
    .p-box-name.dim { color: #333; font-weight: 400; }
    .p-box-time-active { font-size: 14px; color: #b23a1e; opacity: 0.75; margin-top: 3px; margin-left: 13px; }

    /* ── 다음 박스 행 ── */
    .p-box-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 9px; background: #f8f8f8; border-radius: 6px; gap: 8px;
    }
    .p-box-row + .p-box-row { margin-top: 4px; }
    .p-box-row-left { display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1; }
    .p-box-row-name {
      font-size: 16px; color: #333;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1;
    }
    .p-box-row-time { font-size: 14px; color: #999; flex-shrink: 0; }

    /* ── 박스 타입 배지 ── */
    .p-type-badge {
      font-size: 13px; padding: 1px 5px; border-radius: 3px;
      font-weight: 500; flex-shrink: 0; white-space: nowrap;
    }
    .p-badge-daily  { background: #e6f1fb; color: #185fa5; }
    .p-badge-weekly { background: #f9f0ff; color: #531dab; }

    /* ── 기타 ── */
    .p-empty { font-size: 16px; color: #ccc; text-align: center; padding: 10px 0; }
    .p-upcoming-label { margin-top: 10px; }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <div class="p-header">
    <div class="p-header-left">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="p-title">Focus Timeboxer</span>
    </div>
    <button id="settingsBtn" class="p-settings-btn" data-i18n-title="popupSettingsTitle" data-i18n-aria-label="popupSettingsTitle" title="설정 열기" aria-label="설정 열기">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- 현재 페이지 -->
  <div id="currentPageSection" class="p-section" style="display:none;">
    <div class="p-section-label" data-i18n="popupCurrentPage">현재 페이지</div>
    <div class="p-page-row">
      <span id="currentDomain" class="p-domain"></span>
      <span id="domainStatus" class="p-domain-badge" style="display:none;"></span>
      <div class="p-add-btns" id="addBtns" style="display:none;">
        <button id="addPermanentBtn" class="p-add-btn" data-i18n="popupAddPermanent">+ 상시</button>
        <button id="addGeneralBtn" class="p-add-btn" data-i18n="popupAddGeneral">+ 일반</button>
      </div>
    </div>
  </div>

  <!-- 하루 스케줄 토글 -->
  <div class="p-section">
    <div class="p-toggle-row">
      <span data-i18n="popupDaySchedule">하루 스케줄</span>
      <div class="p-switch-wrap">
        <div id="switchTrack" class="p-switch-track" role="switch" aria-checked="false" tabindex="0">
          <div class="p-switch-thumb"></div>
        </div>
        <span id="toggleLabel" class="p-toggle-lbl" data-i18n="popupScheduleDisabled">비활성화</span>
      </div>
    </div>
  </div>

  <!-- 스케줄 섹션 -->
  <div id="scheduleSection" class="p-section">
    <div class="p-section-label" data-i18n="popupCurrentBox">현재 박스</div>
    <div id="currentBoxWrap"></div>
    <div id="upcomingLabel" class="p-section-label p-upcoming-label" style="display:none;" data-i18n="popupNextBox">다음 박스</div>
    <div id="upcomingBoxWrap"></div>
  </div>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
