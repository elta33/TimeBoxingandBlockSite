<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Focus Timeboxer</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="styles/tokens.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 17px;
      color: #111;
      background: #fff;
      margin: 0;
    }

    /* ── 헤더 ── */
    .p-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
    }
    .p-header-left { display: flex; align-items: center; gap: 7px; }
    .p-title { font-size: 17px; font-weight: 600; }
    .p-settings-btn {
      background: none; border: none; cursor: pointer;
      color: #aaa; padding: 3px; border-radius: 4px;
      display: flex; align-items: center;
      transition: color 0.12s;
      font-family: inherit;
    }
    .p-settings-btn:hover { color: #333; }

    /* ── 섹션 ── */
    .p-section { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; }
    .p-section-label { font-size: 14px; color: #999; margin-bottom: 6px; }

    /* ── 현재 페이지 ── */
    .p-page-row {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .p-domain {
      font-size: 17px; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
    }
    .p-add-btns { display: flex; gap: 5px; flex-shrink: 0; }
    .p-add-btn {
      font-size: 14px; padding: 3px 8px;
      background: #fff; border: 1px solid #ddd; border-radius: 5px;
      cursor: pointer; color: #555; white-space: nowrap;
      transition: background 0.12s; font-family: inherit;
    }
    .p-add-btn:hover { background: #f5f5f5; }
    .p-domain-badge {
      font-size: 14px; padding: 3px 8px; border-radius: 5px;
      font-weight: 500; flex-shrink: 0; white-space: nowrap;
    }
    .p-badge-permanent { background: var(--tomato-pale); border: 1px solid var(--tomato-light); color: var(--tomato-text); }
    .p-badge-general   { background: #fffbe6; border: 1px solid #ffe58f; color: #875500; }

    /* ── 하루 스케줄 토글 ── */
    .p-toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .p-switch-wrap { display: flex; align-items: center; gap: 7px; }
    .p-switch-track {
      width: 32px; height: 18px; border-radius: 9px;
      background: #ddd; position: relative; cursor: pointer;
      transition: background 0.2s; flex-shrink: 0; outline: none;
    }
    .p-switch-track:focus-visible { box-shadow: 0 0 0 2px #bbb; }
    .p-switch-track.on { background: var(--tomato); }
    .p-switch-thumb {
      position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.25);
      transition: left 0.2s;
    }
    .p-switch-track.on .p-switch-thumb { left: 16px; }
    .p-toggle-lbl { font-size: 14px; color: #bbb; transition: color 0.2s; }
    .p-toggle-lbl.active { color: var(--tomato); font-weight: 500; }

    /* ── 스케줄 섹션 ── */
    #scheduleSection { border-bottom: none; transition: opacity 0.2s; }
    #scheduleSection.disabled { opacity: 0.35; pointer-events: none; }

    /* ── 현재 박스 카드 ── */
    .p-box-card {
      background: #f8f8f8; border: 1px solid #ebebeb; border-radius: 7px; padding: 8px 10px;
    }
    .p-box-card.active { background: var(--tomato-pale); border-color: var(--tomato-light); }
    .p-box-card-top { display: flex; align-items: center; gap: 6px; }
    .p-box-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--tomato); flex-shrink: 0; }
    .p-box-dot.dim { background: var(--tomato-muted); }
    .p-box-name {
      font-size: 17px; font-weight: 500; color: var(--tomato-text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0;
    }
    .p-box-name.dim { color: #333; font-weight: 400; }
    .p-box-time-active { font-size: 14px; color: var(--tomato-text); opacity: 0.75; margin-top: 3px; margin-left: 13px; }

    /* ── 다음 박스 행 ── */
    .p-box-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 9px; background: #f8f8f8; border-radius: 6px; gap: 8px;
    }
    .p-box-row + .p-box-row { margin-top: 4px; }
    .p-box-row-left { display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1; }
    .p-box-row-name {
      font-size: 16px; color: #333;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1;
    }
    .p-box-row-time { font-size: 14px; color: #999; flex-shrink: 0; }

    /* ── 박스 타입 배지 ── */
    .p-type-badge {
      font-size: 13px; padding: 1px 5px; border-radius: 3px;
      font-weight: 500; flex-shrink: 0; white-space: nowrap;
    }
    .p-badge-daily  { background: #e6f1fb; color: #185fa5; }
    .p-badge-weekly { background: #f9f0ff; color: #531dab; }

    /* ── 기타 ── */
    .p-empty { font-size: 16px; color: #ccc; text-align: center; padding: 10px 0; }
    .p-upcoming-label { margin-top: 10px; }

    /* ── 빈 상태 안내(온보딩): 차단 리스트·스케줄이 전부 비어있을 때만 노출 ── */
    .p-empty-state { display: flex; flex-direction: column; align-items: center; gap: 9px; text-align: center; padding: 16px 14px; }
    .p-empty-state-text { font-size: 15px; color: #999; line-height: 1.4; }
    .p-empty-state-btn {
      font-size: 14px; font-weight: 600; padding: 7px 16px; border-radius: 6px;
      border: none; background: var(--tomato); color: #fff; cursor: pointer;
      transition: background 0.12s; font-family: inherit;
    }
    .p-empty-state-btn:hover { background: var(--tomato-hover); }

    /* ── 포모도로 상태 ── */
    /* scheduleSection과 마찬가지로 표시될 때 팝업 맨 아래 섹션이 되므로 하단 테두리 제거 */
    #pomoSection { border-bottom: none; }
    .p-pomo-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .p-pomo-status {
      font-size: 17px; font-weight: 500; color: var(--tomato-text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
    }

    /* ══════════════ 다크모드 ══════════════
       options.html과 동일한 방식: <html data-theme="dark">일 때만 적용되는
       오버라이드를 맨 끝에 별도로 쌓는다. tomato-pale 등 토큰 배경은
       styles/tokens.css의 다크 오버라이드로 이미 자동 처리됨. */
    :root[data-theme="dark"] { color-scheme: dark; }
    :root[data-theme="dark"] body { background: #121212; color: #e0e0e0; }
    :root[data-theme="dark"] .p-header { border-bottom-color: #262626; }
    :root[data-theme="dark"] .p-settings-btn { color: #6a6a6a; }
    :root[data-theme="dark"] .p-settings-btn:hover { color: #d8d8d8; }
    :root[data-theme="dark"] .p-section { border-bottom-color: #262626; }
    :root[data-theme="dark"] .p-section-label { color: #7a7a7a; }
    :root[data-theme="dark"] .p-add-btn { background: #1c1c1c; border-color: #3a3a3a; color: #aaa; }
    :root[data-theme="dark"] .p-add-btn:hover { background: #262626; }
    :root[data-theme="dark"] .p-badge-general { background: #2e2812; border-color: #4a3e17; color: #e0b84d; }
    :root[data-theme="dark"] .p-switch-track { background: #3a3a3a; }
    :root[data-theme="dark"] .p-toggle-lbl { color: #5e5e5e; }
    :root[data-theme="dark"] .p-box-card { background: #1c1c1c; border-color: #2a2a2a; }
    :root[data-theme="dark"] .p-box-name.dim { color: #d0d0d0; }
    :root[data-theme="dark"] .p-box-row { background: #1c1c1c; }
    :root[data-theme="dark"] .p-box-row-name { color: #d0d0d0; }
    :root[data-theme="dark"] .p-box-row-time { color: #7a7a7a; }
    :root[data-theme="dark"] .p-badge-daily { background: #10233a; color: #6cb8ff; }
    :root[data-theme="dark"] .p-badge-weekly { background: #241a33; color: #b98ff0; }
    :root[data-theme="dark"] .p-empty { color: #555; }
    :root[data-theme="dark"] .p-empty-state-text { color: #7a7a7a; }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <div class="p-header">
    <div class="p-header-left">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="p-title">Focus Timeboxer</span>
    </div>
    <button id="settingsBtn" class="p-settings-btn" data-i18n-title="popupSettingsTitle" data-i18n-aria-label="popupSettingsTitle" title="설정 열기" aria-label="설정 열기">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- 빈 상태 안내: 차단 리스트·스케줄이 전부 비어있는 최초 사용자용 -->
  <div id="emptyStateSection" class="p-section p-empty-state" style="display:none;">
    <div class="p-empty-state-text" data-i18n="popupEmptyStateHint">설정에서 차단할 사이트를 추가해보세요</div>
    <button id="emptyStateOpenBtn" class="p-empty-state-btn" data-i18n="popupSettingsTitle">설정 열기</button>
  </div>

  <!-- 현재 페이지 -->
  <div id="currentPageSection" class="p-section" style="display:none;">
    <div class="p-section-label" data-i18n="popupCurrentPage">현재 페이지</div>
    <div class="p-page-row">
      <span id="currentDomain" class="p-domain"></span>
      <span id="domainStatus" class="p-domain-badge" style="display:none;"></span>
      <div class="p-add-btns" id="addBtns" style="display:none;">
        <button id="addPermanentBtn" class="p-add-btn" data-i18n="popupAddPermanent">+ 상시</button>
        <button id="addGeneralBtn" class="p-add-btn" data-i18n="popupAddGeneral">+ 일반</button>
      </div>
    </div>
  </div>

  <!-- 하루 스케줄 토글 -->
  <div class="p-section">
    <div class="p-toggle-row">
      <span data-i18n="popupDaySchedule">하루 스케줄</span>
      <div class="p-switch-wrap">
        <div id="switchTrack" class="p-switch-track" role="switch" aria-checked="false" tabindex="0">
          <div class="p-switch-thumb"></div>
        </div>
        <span id="toggleLabel" class="p-toggle-lbl" data-i18n="popupScheduleDisabled">비활성화</span>
      </div>
    </div>
  </div>

  <!-- 스케줄 섹션 -->
  <div id="scheduleSection" class="p-section">
    <div class="p-section-label" data-i18n="popupCurrentBox">현재 박스</div>
    <div id="currentBoxWrap"></div>
    <div id="upcomingLabel" class="p-section-label p-upcoming-label" style="display:none;" data-i18n="popupNextBox">다음 박스</div>
    <div id="upcomingBoxWrap"></div>
  </div>

  <!-- 포모도로 상태 -->
  <div id="pomoSection" class="p-section" style="display:none;">
    <div class="p-section-label" data-i18n="popupPomoLabel">포모도로</div>
    <div class="p-pomo-row">
      <span id="pomoStatusText" class="p-pomo-status"></span>
      <button id="pomoPipBtn" class="p-add-btn" data-i18n="pomoPip" data-i18n-title="popupPomoPipTitle" title="PiP 열기">⧉ PiP</button>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="storage-api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
